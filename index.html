<body>
<div id="root"></div>

<script type="text/plain" id="app-source">
const { useState, useEffect, useCallback, useRef } = React;

/* ================= CONFIG ================= */
const SUPABASE_URL = "https://iusmlkohrxeptpmjfode.supabase.co";
const SUPABASE_KEY = "sb_publishable_Lddw4SlGC1o_LyCbK2K6ow__UDp6Krr";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const SESSION_TYPES = [
  "SST Entreprise — 2 jours (16h)",
  "SST Entreprise — 3 jours (21h)",
  "Formation grand public",
  "Recyclage / remise à niveau",
  "Autre",
];

/* ================= HELPERS ================= */
const genCode = (len = 6) => {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let out = "";
  for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
};
const addMonths = (dateStr, months) => {
  const d = new Date(dateStr + "T00:00:00");
  d.setMonth(d.getMonth() + Number(months || 0));
  return d.toISOString().slice(0, 10);
};
const fmtDate = (dateStr) => {
  if (!dateStr) return "—";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("fr-BE", { day: "2-digit", month: "long", year: "numeric" });
};
const daysUntil = (dateStr) => {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return Math.round((new Date(dateStr + "T00:00:00") - today) / 86400000);
};
function statusFor(p) {
  if (p.statut_brevet === "en_attente") return { label: "En attente de résultat", tone: "wait" };
  if (p.statut_brevet === "echoue") return { label: "Non obtenu", tone: "fail" };
  const dleft = daysUntil(p.date_echeance);
  if (dleft === null) return { label: "Obtenu", tone: "ok" };
  if (dleft < 0) return { label: `En retard de ${Math.abs(dleft)} j`, tone: "late" };
  if (dleft <= 60) return { label: `À renouveler dans ${dleft} j`, tone: "soon" };
  return { label: "À jour", tone: "ok" };
}
const TONE_STYLES = {
  ok: { bg: "#EAF6EF", fg: "#1E8E5A", ring: "#BFE6CE" },
  soon: { bg: "#FDF3E4", fg: "#C67C1E", ring: "#F2D8AC" },
  late: { bg: "#FCEAEC", fg: "#D7263D", ring: "#F3C1C8" },
  fail: { bg: "#F1F1EE", fg: "#6B6B63", ring: "#DEDED6" },
  wait: { bg: "#EAF0FA", fg: "#2A5FA5", ring: "#C7D8F0" },
};
const buildClientLink = (mode, nom, code) => {
  const url = new URL(window.location.href.split("#")[0]);
  url.searchParams.set("espace", "client");
  url.searchParams.set("mode", mode);
  url.searchParams.set("nom", nom);
  url.searchParams.set("code", code);
  return url.toString();
};
const copyText = async (text) => { try { await navigator.clipboard.writeText(text); return true; } catch { return false; } };

const nextBrevetNumber = (participants, dateObtention) => {
  const year = new Date(dateObtention + "T00:00:00").getFullYear();
  const prefix = `FR-${year}-`;
  let max = 0;
  participants.forEach((p) => {
    if (p.numero_brevet && p.numero_brevet.startsWith(prefix)) {
      const n = parseInt(p.numero_brevet.slice(prefix.length), 10);
      if (!isNaN(n) && n > max) max = n;
    }
  });
  return prefix + String(max + 1).padStart(4, "0");
};

/* ================= ICONS (texte, léger) ================= */
function Icon({ children, size = 16, color, style = {} }) {
  return <span style={{ fontSize: size, color, lineHeight: 1, display: "inline-block", ...style }}>{children}</span>;
}

function Pulse({ className = "" }) {
  return (
    <svg viewBox="0 0 300 40" className={className} preserveAspectRatio="none">
      <polyline points="0,20 60,20 78,20 88,4 98,36 108,20 300,20" fill="none" stroke="#D7263D" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function Badge({ tone, children }) {
  const s = TONE_STYLES[tone] || TONE_STYLES.wait;
  return (
    <span style={{ background: s.bg, color: s.fg, border: `1px solid ${s.ring}` }} className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold whitespace-nowrap">
      {children}
    </span>
  );
}

/* ================= DB LAYER ================= */
const DEFAULT_SETTINGS = { id: 1, pin: "1234", default_validity_months: 12, org_email: "tfirstrescue@gmail.com", org_phone: "" };

async function fetchTable(table) {
  const { data, error } = await sb.from(table).select("*");
  if (error) { console.error(table, error); return []; }
  return data || [];
}
async function fetchSettings() {
  const { data, error } = await sb.from("app_settings").select("*").eq("id", 1).single();
  if (error || !data) return DEFAULT_SETTINGS;
  return data;
}
async function insertRow(table, obj) {
  const { data, error } = await sb.from(table).insert(obj).select().single();
  if (error) { alert("Erreur d'enregistrement : " + error.message); return null; }
  return data;
}
async function updateRow(table, id, obj) {
  const { error } = await sb.from(table).update(obj).eq("id", id);
  if (error) { alert("Erreur de mise à jour : " + error.message); return false; }
  return true;
}
async function deleteRow(table, id) {
  const { error } = await sb.from(table).delete().eq("id", id);
  if (error) { alert("Erreur de suppression : " + error.message); return false; }
  return true;
}

/* ================= ROOT ================= */
function App() {
  const [loading, setLoading] = useState(true);
  const [sessions, setSessions] = useState([]);
  const [participants, setParticipants] = useState([]);
  const [companies, setCompanies] = useState([]);
  const [courses, setCourses] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [view, setView] = useState("landing");
  const [printParticipant, setPrintParticipant] = useState(null);
  const [clientPrefill, setClientPrefill] = useState(null);

  const reload = useCallback(async () => {
    const [s, p, c, co, st] = await Promise.all([
      fetchTable("sessions"), fetchTable("participants"), fetchTable("companies"), fetchTable("courses"), fetchSettings(),
    ]);
    setSessions(s); setParticipants(p); setCompanies(c); setCourses(co); setSettings(st);
  }, []);

  useEffect(() => {
    reload().then(() => setLoading(false));
    const params = new URLSearchParams(window.location.search);
    if (params.get("espace") === "client") {
      setClientPrefill({ mode: params.get("mode") === "entreprise" ? "entreprise" : "particulier", nom: params.get("nom") || "", code: params.get("code") || "" });
      setView("client");
    }
  }, [reload]);

  if (loading) {
    return (
      <div style={{ background: "#FAFAF8" }} className="min-h-screen flex items-center justify-center">
        <div className="flex flex-col items-center gap-3">
          <Icon size={28} color="#D7263D">♥</Icon>
          <p className="mono text-sm text-gray-500">Chargement…</p>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: "#FAFAF8" }} className="min-h-screen">
      {view === "landing" && <Landing onAdmin={() => setView("admin-login")} onClient={() => setView("client")} />}
      {view === "admin-login" && <AdminLogin pin={settings.pin} onBack={() => setView("landing")} onSuccess={() => setView("admin")} />}
      {view === "admin" && (
        <AdminSpace
          sessions={sessions} participants={participants} companies={companies} courses={courses} settings={settings}
          reload={reload} onExit={() => setView("landing")} onPrint={setPrintParticipant}
        />
      )}
      {view === "client" && (
        <ClientSpace sessions={sessions} participants={participants} companies={companies} courses={courses}
          onBack={() => setView("landing")} onPrint={setPrintParticipant} prefill={clientPrefill} />
      )}
      {printParticipant && (
        <CertificateOverlay participant={printParticipant} session={sessions.find((s) => s.id === printParticipant.session_id)} settings={settings} onClose={() => setPrintParticipant(null)} />
      )}
    </div>
  );
}

/* ================= LANDING ================= */
function Landing({ onAdmin, onClient }) {
  return (
    <div className="min-h-screen flex flex-col">
      <div className="flex-1 flex flex-col items-center justify-center px-6 py-16">
        <div className="flex items-center gap-2 mb-2">
          <Icon color="#D7263D">♥</Icon>
          <span className="mono text-xs font-semibold tracking-[0.2em] uppercase" style={{ color: "#D7263D" }}>First Rescue</span>
        </div>
        <h1 style={{ color: "#14171F" }} className="text-3xl sm:text-4xl font-extrabold text-center max-w-md leading-tight">Suivi des formations en secourisme</h1>
        <Pulse className="w-48 h-8 my-6" />
        <p style={{ color: "#6B6B63" }} className="text-center max-w-sm text-sm mb-10">Inscriptions, brevets, échéances de recyclage, cours en ligne et attestations.</p>
        <div className="grid sm:grid-cols-2 gap-4 w-full max-w-2xl">
          <button onClick={onAdmin} className="group text-left rounded-2xl p-6 transition-all hover:-translate-y-0.5" style={{ background: "#14171F", color: "#FAFAF8" }}>
            <Icon color="#D7263D" size={20}>🛡</Icon>
            <p className="font-bold text-lg mt-3">Espace formateur</p>
            <p className="text-sm opacity-70 mt-1">Sessions, stagiaires, brevets, cours, attestations.</p>
            <div className="flex items-center gap-1 text-xs mt-4 opacity-80 group-hover:opacity-100">Accéder <Icon size={14}>›</Icon></div>
          </button>
          <button onClick={onClient} className="group text-left rounded-2xl p-6 border transition-all hover:-translate-y-0.5" style={{ background: "#fff", borderColor: "#E4E1D8", color: "#14171F" }}>
            <Icon color="#D7263D" size={20}>👥</Icon>
            <p className="font-bold text-lg mt-3">Espace stagiaire &amp; entreprise</p>
            <p className="text-sm mt-1" style={{ color: "#6B6B63" }}>Suivre son certificat et le cours en ligne.</p>
            <div className="flex items-center gap-1 text-xs mt-4" style={{ color: "#D7263D" }}>Vérifier mon certificat <Icon size={14}>›</Icon></div>
          </button>
        </div>
      </div>
      <p className="mono text-center text-[11px] pb-6" style={{ color: "#B3B0A6" }}>First Rescue — Formations &amp; Interventions</p>
    </div>
  );
}

/* ================= ADMIN LOGIN ================= */
function AdminLogin({ pin, onBack, onSuccess }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState(false);
  const submit = (e) => { e.preventDefault(); if (val === pin) onSuccess(); else { setErr(true); setVal(""); } };
  return (
    <div className="min-h-screen flex items-center justify-center px-6">
      <div className="w-full max-w-xs">
        <button onClick={onBack} className="flex items-center gap-1 text-xs mb-6" style={{ color: "#6B6B63" }}><Icon size={14}>←</Icon> Retour</button>
        <Icon size={22} color="#D7263D">🛡</Icon>
        <h2 className="text-xl font-bold mt-3 mb-1" style={{ color: "#14171F" }}>Espace formateur</h2>
        <p className="text-sm mb-5" style={{ color: "#6B6B63" }}>Entrez le code d'accès.</p>
        <form onSubmit={submit}>
          <input autoFocus type="password" inputMode="numeric" value={val} onChange={(e) => { setVal(e.target.value); setErr(false); }}
            className="mono w-full border rounded-xl px-4 py-3 text-lg tracking-widest text-center outline-none" style={{ borderColor: err ? "#D7263D" : "#E4E1D8" }} placeholder="••••" />
          {err && <p className="text-xs mt-2" style={{ color: "#D7263D" }}>Code incorrect.</p>}
          <button type="submit" className="w-full mt-4 rounded-xl py-3 font-semibold text-sm" style={{ background: "#D7263D", color: "#fff" }}>Entrer</button>
        </form>
      </div>
    </div>
  );
}

/* ================= ADMIN SPACE ================= */
function AdminSpace({ sessions, participants, companies, courses, settings, reload, onExit, onPrint }) {
  const [tab, setTab] = useState("dashboard");
  return (
    <div className="min-h-screen pb-16">
      <div className="border-b" style={{ borderColor: "#E4E1D8" }}>
        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-2"><Icon color="#D7263D">♥</Icon><span className="mono text-xs font-semibold tracking-widest uppercase">Espace formateur</span></div>
          <button onClick={onExit} className="flex items-center gap-1 text-xs font-medium" style={{ color: "#6B6B63" }}>Quitter</button>
        </div>
      </div>
      <div className="max-w-5xl mx-auto px-4 sm:px-6">
        <div className="flex gap-1 overflow-x-auto py-4 -mx-1 px-1">
          {[["dashboard", "Vue d'ensemble"], ["sessions", "Sessions"], ["participants", "Stagiaires"], ["cours", "Cours"], ["settings", "Réglages"]].map(([id, label]) => (
            <button key={id} onClick={() => setTab(id)} className="px-3.5 py-2 rounded-lg text-sm font-semibold whitespace-nowrap"
              style={tab === id ? { background: "#14171F", color: "#fff" } : { background: "#fff", color: "#6B6B63", border: "1px solid #E4E1D8" }}>{label}</button>
          ))}
        </div>
        {tab === "dashboard" && <Dashboard sessions={sessions} participants={participants} />}
        {tab === "sessions" && <SessionsTab sessions={sessions} participants={participants} reload={reload} />}
        {tab === "participants" && <ParticipantsTab sessions={sessions} participants={participants} companies={companies} settings={settings} reload={reload} onPrint={onPrint} />}
        {tab === "cours" && <CoursTab courses={courses} reload={reload} />}
        {tab === "settings" && <SettingsTab settings={settings} companies={companies} reload={reload} />}
      </div>
    </div>
  );
}

function Dashboard({ sessions, participants }) {
  const counts = { ok: 0, soon: 0, late: 0, fail: 0, wait: 0 };
  participants.forEach((p) => { counts[statusFor(p).tone]++; });
  const upcoming = [...sessions].filter((s) => s.date && s.date >= new Date().toISOString().slice(0, 10)).sort((a, b) => a.date.localeCompare(b.date)).slice(0, 5);
  const cards = [
    { label: "À jour", value: counts.ok, tone: "ok" }, { label: "À renouveler bientôt", value: counts.soon, tone: "soon" },
    { label: "En retard", value: counts.late, tone: "late" }, { label: "En attente / échoué", value: counts.wait + counts.fail, tone: "wait" },
  ];
  return (
    <div className="pb-10">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
        {cards.map((c) => { const s = TONE_STYLES[c.tone]; return (
          <div key={c.label} className="rounded-xl p-4" style={{ background: s.bg, border: `1px solid ${s.ring}` }}>
            <p className="text-2xl font-extrabold mt-1" style={{ color: s.fg }}>{c.value}</p>
            <p className="text-xs mt-0.5" style={{ color: s.fg }}>{c.label}</p>
          </div>
        );})}
      </div>
      <h3 className="font-bold mb-3 text-sm uppercase tracking-wide" style={{ color: "#6B6B63" }}>Prochaines sessions</h3>
      {upcoming.length === 0 && <p className="text-sm" style={{ color: "#B3B0A6" }}>Aucune session à venir programmée.</p>}
      <div className="space-y-2">
        {upcoming.map((s) => (
          <div key={s.id} className="flex items-center justify-between rounded-xl px-4 py-3 bg-white border" style={{ borderColor: "#E4E1D8" }}>
            <div><p className="font-semibold text-sm" style={{ color: "#14171F" }}>{s.titre || s.type}</p><p className="text-xs" style={{ color: "#6B6B63" }}>{s.type}{s.entreprise ? ` · ${s.entreprise}` : ""}</p></div>
            <span className="mono text-xs font-semibold" style={{ color: "#D7263D" }}>{fmtDate(s.date)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ================= SESSIONS ================= */
function SessionsTab({ sessions, participants, reload }) {
  const [form, setForm] = useState(null);
  const countFor = (id) => participants.filter((p) => p.session_id === id).length;
  const submit = async (data) => {
    if (data.id) await updateRow("sessions", data.id, { titre: data.titre, type: data.type, date: data.date || null, lieu: data.lieu, entreprise: data.entreprise });
    else await insertRow("sessions", { titre: data.titre, type: data.type, date: data.date || null, lieu: data.lieu, entreprise: data.entreprise });
    setForm(null); reload();
  };
  const remove = async (s) => {
    if (countFor(s.id) > 0) { alert("Impossible de supprimer : des stagiaires sont inscrits à cette session."); return; }
    if (confirm(`Supprimer la session « ${s.titre || s.type} » ?`)) { await deleteRow("sessions", s.id); reload(); }
  };
  return (
    <div className="pb-10">
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-bold text-lg" style={{ color: "#14171F" }}>Sessions</h2>
        <button onClick={() => setForm({})} className="flex items-center gap-1.5 text-sm font-semibold px-3 py-2 rounded-lg" style={{ background: "#D7263D", color: "#fff" }}>+ Nouvelle session</button>
      </div>
      {sessions.length === 0 && <EmptyState text="Aucune session pour le moment." />}
      <div className="space-y-2">
        {[...sessions].sort((a, b) => (b.date || "").localeCompare(a.date || "")).map((s) => (
          <div key={s.id} className="rounded-xl bg-white border px-4 py-3.5 flex items-start justify-between gap-3" style={{ borderColor: "#E4E1D8" }}>
            <div className="min-w-0">
              <p className="font-semibold text-sm" style={{ color: "#14171F" }}>{s.titre || s.type}</p>
              <p className="text-xs mt-0.5" style={{ color: "#6B6B63" }}>{s.type}</p>
              <div className="flex flex-wrap gap-x-3 gap-y-1 mt-1.5 text-xs" style={{ color: "#6B6B63" }}>
                <span>{fmtDate(s.date)}</span>{s.lieu && <span>· {s.lieu}</span>}{s.entreprise && <span>· {s.entreprise}</span>}<span>· {countFor(s.id)} stagiaire(s)</span>
              </div>
            </div>
            <div className="flex gap-1 shrink-0">
              <button onClick={() => setForm(s)} className="p-2 rounded-lg hover:bg-gray-50"><Icon>✎</Icon></button>
              <button onClick={() => remove(s)} className="p-2 rounded-lg hover:bg-gray-50"><Icon color="#D7263D">🗑</Icon></button>
            </div>
          </div>
        ))}
      </div>
      {form !== null && <SessionForm initial={form} onCancel={() => setForm(null)} onSubmit={submit} />}
    </div>
  );
}
function SessionForm({ initial, onCancel, onSubmit }) {
  const [data, setData] = useState({ titre: initial.titre || "", type: initial.type || SESSION_TYPES[0], date: initial.date || "", lieu: initial.lieu || "", entreprise: initial.entreprise || "", id: initial.id });
  return (
    <Modal onClose={onCancel} title={initial.id ? "Modifier la session" : "Nouvelle session"}>
      <form onSubmit={(e) => { e.preventDefault(); onSubmit(data); }} className="space-y-3">
        <Field label="Titre (optionnel)"><input value={data.titre} onChange={(e) => setData({ ...data, titre: e.target.value })} className="input" /></Field>
        <Field label="Type de formation"><select value={data.type} onChange={(e) => setData({ ...data, type: e.target.value })} className="input">{SESSION_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}</select></Field>
        <Field label="Date"><input type="date" value={data.date} onChange={(e) => setData({ ...data, date: e.target.value })} className="input" /></Field>
        <Field label="Lieu"><input value={data.lieu} onChange={(e) => setData({ ...data, lieu: e.target.value })} className="input" /></Field>
        <Field label="Entreprise cliente"><input value={data.entreprise} onChange={(e) => setData({ ...data, entreprise: e.target.value })} className="input" /></Field>
        <ModalActions onCancel={onCancel} submitLabel="Enregistrer" />
      </form>
    </Modal>
  );
}

/* ================= PARTICIPANTS ================= */
function ParticipantsTab({ sessions, participants, companies, settings, reload, onPrint }) {
  const [form, setForm] = useState(null);
  const [filterStatut, setFilterStatut] = useState("tous");
  const [q, setQ] = useState("");

  const ensureCompany = async (name) => {
    if (!name) return;
    const exists = companies.find((c) => c.nom.toLowerCase() === name.toLowerCase());
    if (!exists) await insertRow("companies", { nom: name, code: genCode(6) });
  };

  const submit = async (data) => {
    if (data.entreprise) await ensureCompany(data.entreprise);
    const date_echeance = data.statut_brevet === "obtenu" && data.date_obtention ? addMonths(data.date_obtention, data.duree_validite_mois) : null;
    let numero_brevet = data.numero_brevet || null;
    if (data.statut_brevet === "obtenu" && data.date_obtention && !numero_brevet) {
      numero_brevet = nextBrevetNumber(participants, data.date_obtention);
    }
    const record = {
      prenom: data.prenom, nom: data.nom, email: data.email, telephone: data.telephone, entreprise: data.entreprise || null,
      session_id: data.session_id || null, statut_brevet: data.statut_brevet, date_obtention: data.date_obtention || null,
      duree_validite_mois: Number(data.duree_validite_mois), date_echeance, numero_brevet,
    };
    if (data.id) await updateRow("participants", data.id, record);
    else await insertRow("participants", { ...record, code_acces: genCode(6), acces_cours: true });
    setForm(null); reload();
  };
  const remove = async (p) => { if (confirm(`Retirer ${p.prenom} ${p.nom} ?`)) { await deleteRow("participants", p.id); reload(); } };
  const toggleCours = async (p) => { await updateRow("participants", p.id, { acces_cours: !p.acces_cours }); reload(); };

  const filtered = participants
    .filter((p) => (filterStatut === "tous" ? true : statusFor(p).tone === filterStatut))
    .filter((p) => `${p.prenom} ${p.nom} ${p.entreprise || ""}`.toLowerCase().includes(q.toLowerCase()))
    .sort((a, b) => a.nom.localeCompare(b.nom));

  return (
    <div className="pb-10">
      <div className="flex items-center justify-between mb-4 gap-2 flex-wrap">
        <h2 className="font-bold text-lg" style={{ color: "#14171F" }}>Stagiaires</h2>
        <button onClick={() => setForm({})} className="flex items-center gap-1.5 text-sm font-semibold px-3 py-2 rounded-lg" style={{ background: "#D7263D", color: "#fff" }}>+ Inscrire un stagiaire</button>
      </div>
      <div className="flex gap-2 mb-4 flex-wrap">
        <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Rechercher…" className="input flex-1 min-w-[180px]" />
        <select value={filterStatut} onChange={(e) => setFilterStatut(e.target.value)} className="input w-auto">
          <option value="tous">Tous les statuts</option><option value="ok">À jour</option><option value="soon">À renouveler bientôt</option>
          <option value="late">En retard</option><option value="wait">En attente</option><option value="fail">Non obtenu</option>
        </select>
      </div>
      {filtered.length === 0 && <EmptyState text="Aucun stagiaire ne correspond." />}
      <div className="space-y-2">
        {filtered.map((p) => {
          const st = statusFor(p);
          const session = sessions.find((s) => s.id === p.session_id);
          return (
            <div key={p.id} className="rounded-xl bg-white border px-4 py-3.5" style={{ borderColor: "#E4E1D8" }}>
              <div className="flex items-start justify-between gap-3">
                <div className="min-w-0">
                  <p className="font-semibold text-sm" style={{ color: "#14171F" }}>{p.prenom} {p.nom}</p>
                  <p className="text-xs mt-0.5" style={{ color: "#6B6B63" }}>{session ? (session.titre || session.type) : "Session non définie"}{p.entreprise ? ` · ${p.entreprise}` : ""}</p>
                  <div className="flex items-center gap-2 mt-2 flex-wrap">
                    <Badge tone={st.tone}>{st.label}</Badge>
                    {p.statut_brevet === "obtenu" && <span className="mono text-[11px]" style={{ color: "#B3B0A6" }}>échéance {fmtDate(p.date_echeance)}</span>}
                    <button onClick={() => copyText(p.code_acces)} className="mono text-[11px] flex items-center gap-1 border rounded px-1.5 py-0.5" style={{ color: "#6B6B63" }}>code {p.code_acces}</button>
                    <button onClick={async () => { const ok = await copyText(buildClientLink("particulier", p.nom, p.code_acces)); alert(ok ? "Lien copié." : "Erreur de copie."); }} className="text-[11px] flex items-center gap-1 border rounded px-1.5 py-0.5 font-semibold" style={{ color: "#D7263D" }}>🔗 copier le lien</button>
                    <button onClick={() => toggleCours(p)} className="text-[11px] flex items-center gap-1 border rounded px-1.5 py-0.5 font-semibold" style={p.acces_cours ? { color: "#1E8E5A" } : { color: "#D7263D" }}>
                      {p.acces_cours ? "🔓 cours autorisé" : "🔒 cours bloqué"}
                    </button>
                  </div>
                </div>
                <div className="flex gap-1 shrink-0">
                  {p.statut_brevet === "obtenu" && <button onClick={() => onPrint(p)} className="p-2 rounded-lg hover:bg-gray-50"><Icon>🖨</Icon></button>}
                  <button onClick={() => setForm(p)} className="p-2 rounded-lg hover:bg-gray-50"><Icon>✎</Icon></button>
                  <button onClick={() => remove(p)} className="p-2 rounded-lg hover:bg-gray-50"><Icon color="#D7263D">🗑</Icon></button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {form !== null && <ParticipantForm initial={form} sessions={sessions} onCancel={() => setForm(null)} onSubmit={submit} defaultValidityMonths={settings.default_validity_months} />}
    </div>
  );
}
function ParticipantForm({ initial, sessions, onCancel, onSubmit, defaultValidityMonths }) {

    statut_brevet: initial.statut_brevet || "en_attente", date_obtention: initial.date_obtention || "",
    duree_validite_mois: initial.duree_validite_mois || defaultValidityMonths || 12, id: initial.id, numero_brevet: initial.numero_brevet,

        <Field label="Entreprise (si inscription pro)"><input value={data.entreprise} onChange={(e) => setData({ ...data, entreprise: e.target.value })} className="input" /></Field>
        <Field label="Session">
          <select value={data.session_id} onChange={(e) => setData({ ...data, session_id: e.target.value })} className="input">
            <option value="">— Aucune —</option>
            {sessions.map((s) => <option key={s.id} value={s.id}>{(s.titre || s.type)} · {fmtDate(s.date)}</option>)}
          </select>
        </Field>
        <Field label="Statut du brevet">

            <option value="en_attente">En attente de résultat</option><option value="obtenu">Obtenu</option><option value="echoue">Non obtenu</option>
          </select>

            <Field label="Validité (mois)"><input required type="number" min="1" value={data.duree_validite_mois} onChange={(e) => setData({ ...data, duree_validite_mois: e.target.value })} className="input" /></Field>
          </div>

    </Modal>
  );
}

/* ================= COURS (admin) ================= */
function CoursTab({ courses, reload }) {
  const [selectedType, setSelectedType] = useState(SESSION_TYPES[0]);
  const [busy, setBusy] = useState(false);
  const [pageCount, setPageCount] = useState(null);
  const fileInput = useRef(null);

  const course = courses.find((c) => c.type === selectedType);

  useEffect(() => {
    setPageCount(null);
    if (!course?.pdf_path) return;
    sb.storage.from("cours").download(course.pdf_path).then(async ({ data }) => {
      if (!data) return;
      const buf = await data.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      setPageCount(pdf.numPages);
    });
  }, [course?.pdf_path]);

  const uploadPdf = async (file) => {
    if (file.type !== "application/pdf") { alert("Merci de sélectionner un fichier PDF (Enregistrer sous → PDF depuis PowerPoint)."); return; }
    setBusy(true);
    let c = course;
    if (!c) c = await insertRow("courses", { type: selectedType, titre: selectedType });
    if (!c) { setBusy(false); return; }
    const path = `${c.id}/cours.pdf`;
    const { error } = await sb.storage.from("cours").upload(path, file, { upsert: true });
    if (error) { alert("Erreur upload : " + error.message); setBusy(false); return; }
    await updateRow("courses", c.id, { pdf_path: path, titre: selectedType, updated_at: new Date().toISOString() });
    await reload();
    setBusy(false);
  };

  const removePdf = async () => {
    if (!course?.pdf_path || !confirm("Supprimer le cours de ce type de formation ?")) return;
    await sb.storage.from("cours").remove([course.pdf_path]);
    await updateRow("courses", course.id, { pdf_path: null });
    await reload();
  };

  return (
    <div className="pb-10 max-w-2xl">
      <h2 className="font-bold text-lg mb-4" style={{ color: "#14171F" }}>Cours en ligne</h2>
      <Field label="Type de formation">
        <select value={selectedType} onChange={(e) => setSelectedType(e.target.value)} className="input">
          {SESSION_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
        </select>
      </Field>
      <p className="text-xs mt-2 mb-4" style={{ color: "#B3B0A6" }}>
        Un seul PDF par type de formation. Les stagiaires inscrits à une session de ce type le voient dans leur espace, s'ils sont autorisés.
      </p>

      {course?.pdf_path ? (
        <div className="rounded-xl bg-white border px-4 py-3.5 mb-4 flex items-center justify-between" style={{ borderColor: "#E4E1D8" }}>
          <div>
            <p className="font-semibold text-sm" style={{ color: "#14171F" }}>📄 Cours actuel</p>
            <p className="text-xs mt-0.5" style={{ color: "#6B6B63" }}>{pageCount ? `${pageCount} page(s)` : "Chargement…"}</p>
          </div>
          <button onClick={removePdf} className="text-xs font-semibold border rounded px-2 py-1" style={{ borderColor: "#F3C1C8", color: "#D7263D" }}>🗑 Retirer</button>
        </div>
      ) : (
        <EmptyState text="Aucun cours pour ce type de formation pour le moment." />
      )}

      <div className="rounded-xl border-dashed border-2 p-6 text-center mt-4" style={{ borderColor: "#E4E1D8" }}>
        <input ref={fileInput} type="file" accept="application/pdf" className="hidden" onChange={(e) => e.target.files.length && uploadPdf(e.target.files[0])} />
        <button disabled={busy} onClick={() => fileInput.current.click()} className="text-sm font-semibold px-4 py-2 rounded-lg" style={{ background: "#14171F", color: "#fff" }}>
          {busy ? "Envoi en cours…" : course?.pdf_path ? "⬆ Remplacer le PDF" : "⬆ Ajouter le cours (PDF)"}
        </button>
        <p className="text-[11px] mt-2" style={{ color: "#B3B0A6" }}>
          Depuis PowerPoint : Fichier → Enregistrer sous → format PDF, puis sélectionne ce fichier ici.
        </p>
      </div>
    </div>
  );
}

function ClientSpace({ sessions, participants, companies, courses, onBack, onPrint, prefill }) {
  const [mode, setMode] = useState(prefill?.mode || "particulier");
  const [nom, setNom] = useState(prefill?.nom || "");
  const [code, setCode] = useState(prefill?.code || "");
  const [result, setResult] = useState(undefined);
  const [showCourse, setShowCourse] = useState(false);

  const runSearch = useCallback((m, n, c) => {
    if (m === "particulier") {
      const found = participants.find((p) => p.nom.toLowerCase() === n.trim().toLowerCase() && p.code_acces.toUpperCase() === c.trim().toUpperCase());
      setResult(found || null);
    } else {
      const comp = companies.find((co) => co.nom.toLowerCase() === n.trim().toLowerCase() && co.code.toUpperCase() === c.trim().toUpperCase());
      setResult(comp ? { company: comp } : null);
    }
  }, [participants, companies]);

  useEffect(() => { if (prefill?.nom && prefill?.code) runSearch(prefill.mode, prefill.nom, prefill.code); }, []);

  const search = (e) => { e.preventDefault(); runSearch(mode, nom, code); };

  if (showCourse && result && !result.company) {
    const session = sessions.find((s) => s.id === result.session_id);
    const course = courses.find((c) => c.type === session?.type);
    return <CourseViewer course={course} onClose={() => setShowCourse(false)} />;
  }

  return (
    <div className="min-h-screen">
      <div className="max-w-md mx-auto px-6 py-10">
        <button onClick={onBack} className="flex items-center gap-1 text-xs mb-6" style={{ color: "#6B6B63" }}>← Retour</button>
        <div className="flex items-center gap-2 mb-1"><Icon color="#D7263D">♥</Icon><span className="mono text-xs font-semibold tracking-widest uppercase" style={{ color: "#D7263D" }}>First Rescue</span></div>
        <h2 className="text-xl font-bold mb-5" style={{ color: "#14171F" }}>Suivre mon certificat</h2>
        <div className="flex gap-1 mb-4">
          {[["particulier", "Stagiaire"], ["entreprise", "Entreprise"]].map(([id, label]) => (
            <button key={id} onClick={() => { setMode(id); setResult(undefined); setNom(""); setCode(""); }} className="px-3.5 py-2 rounded-lg text-sm font-semibold"
              style={mode === id ? { background: "#14171F", color: "#fff" } : { background: "#fff", color: "#6B6B63", border: "1px solid #E4E1D8" }}>{label}</button>
          ))}
        </div>
        <form onSubmit={search} className="space-y-3 bg-white border rounded-xl p-4" style={{ borderColor: "#E4E1D8" }}>
          <Field label={mode === "particulier" ? "Nom de famille" : "Nom de l'entreprise"}><input required value={nom} onChange={(e) => setNom(e.target.value)} className="input" /></Field>
          <Field label="Code d'accès"><input required value={code} onChange={(e) => setCode(e.target.value)} className="input mono uppercase" placeholder="Ex. K3F7QZ" /></Field>
          <button type="submit" className="w-full rounded-lg py-2.5 text-sm font-semibold" style={{ background: "#D7263D", color: "#fff" }}>Vérifier</button>
        </form>
        {result === null && <p className="text-sm mt-4 text-center" style={{ color: "#D7263D" }}>Aucune correspondance. Vérifiez le nom et le code.</p>}
        {result && !result.company && <ParticipantResultCard participant={result} session={sessions.find((s) => s.id === result.session_id)} courses={courses} onPrint={onPrint} onOpenCourse={() => setShowCourse(true)} />}
        {result && result.company && <CompanyResultCard company={result.company} participants={participants.filter((p) => (p.entreprise || "").toLowerCase() === result.company.nom.toLowerCase())} sessions={sessions} />}
      </div>
    </div>
  );
}

/* ================= COURSE VIEWER (view-only, PDF) ================= */
function CourseViewer({ course, onClose }) {
  const [pdf, setPdf] = useState(null);
  const [numPages, setNumPages] = useState(0);
  const [idx, setIdx] = useState(1);
  const [loading, setLoading] = useState(true);
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!course?.pdf_path) { setLoading(false); return; }
    let cancelled = false;
    sb.storage.from("cours").download(course.pdf_path).then(async ({ data }) => {
      if (!data || cancelled) { setLoading(false); return; }
      const buf = await data.arrayBuffer();
      const doc = await pdfjsLib.getDocument({ data: buf }).promise;
      if (cancelled) return;
      setPdf(doc);
      setNumPages(doc.numPages);
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, [course?.pdf_path]);

  useEffect(() => {
    if (!pdf) return;
    let cancelled = false;
    pdf.getPage(idx).then((page) => {
      if (cancelled) return;
      const viewportBase = page.getViewport({ scale: 1 });
      const scale = Math.min(1000 / viewportBase.width, 700 / viewportBase.height, 2);
      const viewport = page.getViewport({ scale });
      const canvas = canvasRef.current;
      if (!canvas) return;
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext("2d");
      page.render({ canvasContext: ctx, viewport });
    });
    return () => { cancelled = true; };
  }, [pdf, idx]);

  if (!course || !course.pdf_path) {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center px-6">
        <p className="text-sm" style={{ color: "#6B6B63" }}>Aucun cours n'est encore disponible pour cette formation.</p>
        <button onClick={onClose} className="mt-4 text-sm font-semibold px-4 py-2 rounded-lg" style={{ background: "#14171F", color: "#fff" }}>Retour</button>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col items-center px-4 py-8" onContextMenu={(e) => e.preventDefault()}>
      <div className="w-full max-w-2xl flex items-center justify-between mb-4">
        <button onClick={onClose} className="text-xs font-semibold" style={{ color: "#6B6B63" }}>← Retour</button>
        <span className="mono text-xs" style={{ color: "#B3B0A6" }}>{course.titre}</span>
      </div>
      {loading && <p className="text-sm" style={{ color: "#B3B0A6" }}>Chargement du cours…</p>}
      {!loading && numPages > 0 && (
        <>
          <div className="rounded-xl overflow-hidden shadow-lg border bg-white" style={{ borderColor: "#E4E1D8" }}>
            <canvas ref={canvasRef} className="max-w-full" style={{ display: "block" }} onContextMenu={(e) => e.preventDefault()} draggable={false} />
          </div>
          <div className="flex items-center gap-4 mt-5">
            <button onClick={() => setIdx((i) => Math.max(1, i - 1))} disabled={idx === 1} className="px-4 py-2 rounded-lg text-sm font-semibold disabled:opacity-30" style={{ background: "#14171F", color: "#fff" }}>‹ Précédent</button>
            <span className="mono text-xs" style={{ color: "#6B6B63" }}>{idx} / {numPages}</span>
            <button onClick={() => setIdx((i) => Math.min(numPages, i + 1))} disabled={idx === numPages} className="px-4 py-2 rounded-lg text-sm font-semibold disabled:opacity-30" style={{ background: "#14171F", color: "#fff" }}>Suivant ›</button>
          </div>
          <p className="text-[11px] mt-6 text-center max-w-sm" style={{ color: "#B3B0A6" }}>Ce contenu est réservé à votre usage personnel dans le cadre de votre formation. Merci de ne pas le partager.</p>
        </>
      )}
    </div>
  );
}

function CertificateOverlay({ participant, session, settings, onClose }) {
  useEffect(() => { const id = setTimeout(() => window.print(), 300); return () => clearTimeout(id); }, []);
  return (
    <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4 overflow-auto">
      <div className="absolute top-4 right-4 flex gap-2" style={{ zIndex: 60 }}>
        <button onClick={() => window.print()} className="text-xs font-semibold px-3 py-2 rounded-lg bg-white">🖨 Imprimer / PDF</button>
        <button onClick={onClose} className="p-2 rounded-lg bg-white">✕</button>
      </div>
      <div
        id="cert-area"
        style={{
          display: "block", width: "900px", aspectRatio: "842.25 / 595.5", background: "#fff",
          position: "relative", fontFamily: "'Cormorant Garamond', serif", color: "#1A1A1A", overflow: "hidden", flexShrink: 0,
        }}
        className="rounded-lg shadow-2xl"
      >
        <img src={HEART_WATERMARK} alt="" style={{ position: "absolute", top: "48%", left: "50%", transform: "translate(-50%,-50%)", width: "42%", opacity: 0.95, pointerEvents: "none" }} />

        <div style={{ position: "absolute", top: "5%", right: "4%", fontSize: "15px", color: "#333" }}>N° {participant.numero_brevet || "—"}</div>

        <div style={{ position: "absolute", top: "6%", left: "6%", fontSize: "50px", letterSpacing: "5px", fontWeight: 500 }}>CERTIFICATION</div>

        <div style={{ position: "relative", zIndex: 1, textAlign: "center", marginTop: "16%", fontStyle: "italic", fontSize: "17px" }}>Ce certificat est décerné à</div>

        <div style={{ position: "relative", zIndex: 1, textAlign: "center", marginTop: "14px" }}>
          <span style={{ fontVariant: "small-caps", fontSize: "25px", borderBottom: "1px dotted #333", padding: "0 36px 4px", letterSpacing: "0.5px" }}>
            {participant.prenom} {participant.nom}
          </span>
        </div>

        <div style={{ position: "relative", zIndex: 1, textAlign: "center", maxWidth: "72%", margin: "18px auto 0", fontSize: "14.5px", lineHeight: 1.5 }}>
          Pour avoir satisfait aux compétences demandées dans par l'A.R du 15 décembre 2010 relatif aux premiers secours dispensés aux travailleurs victimes d'un accident ou d'un malaise
        </div>

        <div style={{ position: "relative", zIndex: 1, textAlign: "center", marginTop: "14px", fontVariant: "small-caps", fontSize: "22px", fontWeight: 600 }}>
          Secouriste d'entreprise
        </div>

        <div style={{ position: "relative", zIndex: 1, textAlign: "center", marginTop: "10px", fontStyle: "italic", fontSize: "16px" }}>
          Obtenu le {fmtDate(participant.date_obtention)}
        </div>
        <div style={{ position: "relative", zIndex: 1, textAlign: "center", fontSize: "12.5px", color: "#555" }}>
          Validité : {fmtDate(participant.date_echeance)}
        </div>

        <div style={{ position: "absolute", left: "6%", bottom: "10%" }}>
          <div style={{ width: "150px", borderTop: "2px solid #14171F", marginBottom: "6px" }} />
          <div style={{ fontVariant: "small-caps", fontSize: "14px" }}>Bastien Mauën</div>
          <div style={{ fontStyle: "italic", fontSize: "11px", color: "#555" }}>Formateur agréé SPF Emploi</div>
        </div>

        <div style={{ position: "absolute", right: "5%", bottom: "7%", textAlign: "center" }}>
          <div style={{ color: "#D7263D", fontSize: "18px", lineHeight: 1 }}>♥</div>
          <div style={{ fontFamily: "'Archivo', sans-serif", fontWeight: 800, fontSize: "16px", color: "#D7263D", letterSpacing: "0.5px" }}>FIRST RESCUE</div>
          <div style={{ fontFamily: "'Archivo', sans-serif", fontSize: "8px", color: "#D7263D", letterSpacing: "1.5px" }}>FORMATION &amp; INTERVENTION</div>
        </div>
      </div>
    </div>
  );
}

/* ================= SHARED UI ================= */
function Modal({ title, children, onClose }) {
  return (
    <div className="fixed inset-0 z-40 bg-black/40 flex items-end sm:items-center justify-center p-0 sm:p-4">
      <div className="bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between px-5 py-4 border-b sticky top-0 bg-white" style={{ borderColor: "#E4E1D8" }}>
          <h3 className="font-bold" style={{ color: "#14171F" }}>{title}</h3>
          <button onClick={onClose}>✕</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}
function ModalActions({ onCancel, submitLabel }) {
  return (
    <div className="flex gap-2 pt-2">
      <button type="button" onClick={onCancel} className="flex-1 rounded-lg py-2.5 text-sm font-semibold" style={{ background: "#F1F1EE", color: "#6B6B63" }}>Annuler</button>
      <button type="submit" className="flex-1 rounded-lg py-2.5 text-sm font-semibold" style={{ background: "#D7263D", color: "#fff" }}>{submitLabel}</button>
    </div>
  );
}
function Field({ label, children }) {
  return <label className="block"><span className="block text-xs font-semibold mb-1" style={{ color: "#6B6B63" }}>{label}</span>{children}</label>;
}
function EmptyState({ text }) {
  return <div className="rounded-xl border border-dashed py-10 text-center" style={{ borderColor: "#E4E1D8" }}><p className="text-sm" style={{ color: "#B3B0A6" }}>{text}</p></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  (function () {
    var code = document.getElementById("app-source").textContent;
    var output = Babel.transform(code, {
      presets: [["react", { runtime: "classic" }]],
    }).code;
    var s = document.createElement("script");
    s.text = output;
    document.body.appendChild(s);
  })();
</script>
